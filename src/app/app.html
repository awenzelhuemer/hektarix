<mat-toolbar class="app-toolbar">
  <div class="toolbar-bg" aria-hidden="true">
    <mat-icon>terrain</mat-icon>
    <mat-icon>forest</mat-icon>
    <mat-icon>wheat</mat-icon>
    <mat-icon>grass</mat-icon>
    <mat-icon>forest</mat-icon>
    <mat-icon>wheat</mat-icon>
    <mat-icon>terrain</mat-icon>
  </div>
  <span class="toolbar-title">Hektarix</span>
  <span class="toolbar-spacer"></span>
  @if (authService.user(); as user) {
    @if (user.photoURL) {
      <img [src]="user.photoURL" class="toolbar-avatar" [alt]="user.displayName ?? ''">
    }
    <button mat-icon-button (click)="signOut()" aria-label="Abmelden" class="toolbar-btn">
      <mat-icon>logout</mat-icon>
    </button>
  }
</mat-toolbar>

<router-outlet />

@if (authService.user()) {
  <nav class="bottom-nav">
    <a class="bottom-nav-item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <mat-icon>map</mat-icon>
      <span>Karte</span>
    </a>
    <a class="bottom-nav-item" routerLink="/list" routerLinkActive="active">
      <mat-icon>format_list_bulleted</mat-icon>
      <span>Liste</span>
    </a>
    <a class="bottom-nav-item" routerLink="/record" routerLinkActive="active">
      <mat-icon>route</mat-icon>
      <span>Aufzeichnung</span>
    </a>
  </nav>
}
