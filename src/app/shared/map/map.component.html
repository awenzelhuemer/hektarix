<div #mapEl class="map-fill"></div>

<div class="map-controls">
  <ng-content></ng-content>
</div>

<div class="layer-switcher-container">
  <button mat-mini-fab class="map-fab" (click)="layerSwitcherOpen = !layerSwitcherOpen" aria-label="Kartenebenen">
    <mat-icon>layers</mat-icon>
  </button>
  @if (layerSwitcherOpen) {
    <div class="layer-switcher-panel">
      <div class="layer-group-title">Karten</div>
      @for (name of baseLayerNames; track name) {
        <label class="layer-item">
          <input type="radio" [checked]="name === activeBaseName" (change)="selectBaseLayer(name)">
          <span>{{ name }}</span>
        </label>
      }
      @if (overlayNames.length) {
        <div class="layer-group-title">Ebenen</div>
        @for (name of overlayNames; track name) {
          <label class="layer-item">
            <input type="checkbox" [checked]="isOverlayActive(name)" (change)="toggleOverlay(name)">
            <span>{{ name }}</span>
          </label>
        }
      }
    </div>
  }
</div>

<div class="map-controls-right">
  <button mat-mini-fab class="map-fab compass-btn" (click)="resetNorth()" aria-label="Nach Norden ausrichten">
    <svg width="20" height="20" viewBox="-10 -10 20 20">
      <g [style.transform]="'rotate(' + mapRotation() + 'rad)'" style="transform-origin: 0px 0px">
        <polygon points="0,-8 3,0 0,-2 -3,0" fill="#e53935"/>
        <polygon points="0,8 3,0 0,2 -3,0" fill="#bdbdbd"/>
        <circle r="1.5" fill="#333"/>
      </g>
    </svg>
  </button>
  <button mat-mini-fab class="map-fab" (click)="goToLocation()" aria-label="Meinen Standort anzeigen">
    <mat-icon>my_location</mat-icon>
  </button>
</div>
