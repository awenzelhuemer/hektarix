<app-map
  class="map-container"
  [mapOptions]="mapOptions"
  [persistView]="true"
  (mapReady)="onMapReady($event)">

  @if (drawMode() === 'edit-single') {
    <button mat-mini-fab class="map-fab" (click)="confirmMode()" aria-label="Speichern">
      <mat-icon>check</mat-icon>
    </button>
    <button mat-mini-fab class="map-fab" (click)="cancelMode()" aria-label="Abbrechen">
      <mat-icon>close</mat-icon>
    </button>
  }

</app-map>

@if (forestArea() > 0 || fieldArea() > 0) {
  <div class="total-area">
    @if (forestArea() > 0) {
      <div class="total-area-row">
        <span class="total-area-dot" style="background:#2d6a4f"></span>
        <span class="total-area-label">Wald</span>
        <span class="total-area-value">{{ formatArea(forestArea()) }}</span>
      </div>
    }
    @if (fieldArea() > 0) {
      <div class="total-area-row">
        <span class="total-area-dot" style="background:#e9c46a"></span>
        <span class="total-area-label">Feld</span>
        <span class="total-area-value">{{ formatArea(fieldArea()) }}</span>
      </div>
    }
  </div>
}
